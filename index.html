
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .timer-box { background: var(--card); border-radius: 15px; padding: 15px; text-align: center; border: 2px solid transparent; }
        .timer-box.running { border-color: var(--green); background: #1e3a2f; }
        .label { color: #94a3b8; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .time-display { font-size: 32px; font-family: monospace; font-weight: bold; color: var(--green); margin-bottom: 10px; cursor: pointer; }
        .btn { background: var(--green); border: none; color: #fff; padding: 12px; border-radius: 10px; width: 100%; font-size: 14px; font-weight: bold; cursor: pointer; }
        #audio-init { background: #f59e0b; color: white; border: none; padding: 20px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; width: 100%; max-width: 400px; cursor: pointer; font-size: 18px; }
        #alarm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #b91c1c; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        #alarm-overlay h2 { font-size: 45px; color: white; margin-bottom: 30px; text-align: center; }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">🔊 ALARM-SYSTEM SCHARF SCHALTEN</button>

<div class="container" id="app"></div>

<div id="alarm-overlay">
    <h2 id="alarm-name">FERTIG</h2>
    <button class="btn" style="width: 250px; height: 100px; font-size: 24px; background: white; color: black; border: 4px solid black;" onclick="stopSirene()">SIRENE AUS</button>
</div>

<script>
    let audioCtx = null;
    let sireneActive = false;
    let timers = [];
    let endTimes = {}; 

    // Audio-Initialisierung OHNE Dauerrauschen
    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Nur ein ganz kurzer Klick-Ton zur Aktivierung
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        g.gain.value = 0.1;
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.05);
        
        if ('vibrate' in navigator) navigator.vibrate(50);
        this.style.display = "none";
    });

    // Die Sirene (nur wenn Zeit abgelaufen ist)
    async function startSirene() {
        if (!audioCtx) return;
        sireneActive = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        while (sireneActive) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            let freq = (Math.floor(Date.now() / 200) % 2 === 0) ? 1500 : 800;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            if ('vibrate' in navigator) navigator.vibrate(300);
            await new Promise(r => setTimeout(r, 250));
        }
    }

    function stopSirene() {
        sireneActive = false;
        document.getElementById('alarm-overlay').style.display = "none";
        if ('vibrate' in navigator) navigator.vibrate(0);
    }

    function tick() {
        const now = Date.now();
        let needsRender = false;

        timers.forEach((t, i) => {
            if (endTimes[i]) {
                const diff = endTimes[i] - now;
                if (diff <= 0) {
                    endTimes[i] = null;
                    t.time = t.initial;
                    document.getElementById('alarm-name').innerText = t.name;
                    document.getElementById('alarm-overlay').style.display = "flex";
                    startSirene();
                    needsRender = true;
                } else {
                    const newSec = Math.ceil(diff / 1000);
                    if (t.time !== newSec) {
                        t.time = newSec;
                        needsRender = true;
                    }
                }
            }
        });
        if (needsRender) render();
    }

    setInterval(tick, 200);

    const defaultData = [
        { name: "Timer 1", time: 60, initial: 60 }, { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 }, { name: "Timer 4", time: 900, initial: 900 },
        { name: "Timer 5", time: 1200, initial: 1200 }, { name: "Timer 6", time: 1800, initial: 1800 }
    ];

    timers = JSON.parse(localStorage.getItem('myTimers')) || defaultData;

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = !!endTimes[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `
                <div class="label" onclick="editName(${i})">${t.name}</div>
                <div class="time-display" onclick="editTime(${i})">${Math.floor(t.time/60)}:${(t.time%60).toString().padStart(2, '0')}</div>
                <button class="btn" onclick="toggle(${i})" style="background:${isRunning ? '#ef4444' : '#22c55e'}">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(div);
        });
    }

    function toggle(i) {
        if (endTimes[i]) {
            endTimes[i] = null;
            timers[i].time = timers[i].initial;
        } else {
            if (!audioCtx) { alert("Bitte erst oben SOUND AKTIVIEREN!"); return; }
            endTimes[i] = Date.now() + (timers[i].time * 1000);
        }
        render();
    }

    function editTime(i) {
        if (endTimes[i]) return;
        let m = prompt("Minuten für " + timers[i].name + ":", timers[i].initial / 60);
        if (m) {
            let val = parseInt(m) * 60;
            timers[i].initial = val;
            timers[i].time = val;
            save(); render();
        }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { timers[i].name = n; save(); render(); }
    }

    function save() { localStorage.setItem('myTimers', JSON.stringify(timers)); }
    render();
</script>
</body>
</html>
