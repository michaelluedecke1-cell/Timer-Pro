
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: var(--text-main); letter-spacing: 1px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .timer-box.running { 
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .label { 
            color: var(--text-dim); 
            font-size: 14px; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-display { 
            font-size: 32px; 
            font-family: monospace;
            font-weight: bold; 
            color: var(--accent); 
            margin-bottom: 15px; 
        }

        .btn { 
            background: var(--accent); 
            border: none; 
            color: #fff; 
            padding: 10px; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        #audio-init {
            background: #334155;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .footer { margin-top: 30px; font-size: 10px; color: var(--text-dim); text-align: center; }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">🔊 Sound aktivieren</button>

<div class="container" id="app"></div>

<div class="footer">Tippe auf Namen oder Zeit zum Bearbeiten.<br>Browser-Tab muss offen bleiben.</div>

<script>
    // Audio Context Initialisierung
    let audioCtx = null;
    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.style.display = 'none';
    });

    function playAlarm() {
        if (!audioCtx) return;
        
        // Erzeuge einen lauten Sirenen-Effekt (3 Wiederholungen)
        for(let i = 0; i < 3; i++) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + (i * 0.5));
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + (i * 0.5) + 0.4);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.5));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.5) + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime + (i * 0.5));
            osc.stop(audioCtx.currentTime + (i * 0.5) + 0.5);
        }
        if ('vibrate' in navigator) navigator.vibrate([200, 100, 200, 100, 500]);
    }

    // Web Worker Script als String für Hintergrund-Betrieb
    const workerCode = `
        let intervals = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                intervals[index] = setInterval(() => {
                    self.postMessage({ index, tick: true });
                }, 1000);
            } else {
                clearInterval(intervals[index]);
                delete intervals[index];
            }
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(blob));

    const defaultData = [
        { id: 1, name: "Timer 1", time: 60, initial: 60 },
        { id: 2, name: "Timer 2", time: 300, initial: 300 },
        { id: 3, name: "Timer 3", time: 600, initial: 600 },
        { id: 4, name: "Timer 4", time: 900, initial: 900 },
        { id: 5, name: "Timer 5", time: 1200, initial: 1200 },
        { id: 6, name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('myTimers')) || defaultData;
    let runningStates = {};

    timerWorker.onmessage = function(e) {
        const { index, tick } = e.data;
        if (tick && timers[index].time > 0) {
            timers[index].time--;
            if (timers[index].time === 0) {
                stopTimer(index);
                playAlarm();
                setTimeout(() => alert(timers[index].name + " ist abgelaufen!"), 100);
            }
            render();
        }
    };

    function saveToStorage() {
        localStorage.setItem('myTimers', JSON.stringify(timers));
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, index) => {
            const isRunning = runningStates[index];
            const box = document.createElement('div');
            box.className = `timer-box ${isRunning ? 'running' : ''}`;
            box.innerHTML = `
                <div class="label" onclick="editName(${index})">${t.name}</div>
                <div class="time-display" onclick="editTime(${index})">${formatTime(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggleTimer(${index})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(box);
        });
    }

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = s % 60;
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function toggleTimer(index) {
        if (runningStates[index]) {
            stopTimer(index);
        } else {
            if (timers[index].time <= 0) timers[index].time = timers[index].initial;
            runningStates[index] = true;
            timerWorker.postMessage({ index, cmd: 'start' });
        }
        render();
    }

    function stopTimer(index) {
        runningStates[index] = false;
        timerWorker.postMessage({ index, cmd: 'stop' });
        render();
    }

    function editTime(index) {
        let newMin = prompt("Minuten eingeben:", Math.floor(timers[index].time / 60));
        if (newMin !== null) {
            const val = parseInt(newMin) * 60;
            timers[index].time = val;
            timers[index].initial = val;
            saveToStorage();
            render();
        }
    }

    function editName(index) {
        let newName = prompt("Name:", timers[index].name);
        if (newName) {
            timers[index].name = newName;
            saveToStorage();
            render();
        }
    }

    render();
</script>
</body>
</html>
