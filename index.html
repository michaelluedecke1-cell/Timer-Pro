
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); border-radius: 20px; 
            padding: 20px; text-align: center; border: 2px solid transparent;
        }

        .timer-box.running { border-color: var(--accent); }

        .label { color: #94a3b8; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
        .time-display { font-size: 30px; font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 12px; }

        .btn { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px; border-radius: 12px; width: 100%; 
            font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        #audio-init {
            background: #f59e0b; color: white; border: none;
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
            font-weight: bold; width: 100%; max-width: 400px; cursor: pointer;
        }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">⚠️ SOUND AKTIVIEREN (VOR START)</button>

<div class="container" id="app"></div>

<script>
    let audioCtx = null;
    let alarmActive = false;
    let running = {};

    // Sound-System initialisieren
    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.style.backgroundColor = "#22c55e";
        this.innerText = "✅ SOUND BEREIT";
        // Kurzer Test-Ton
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    });

    // DER ENDLOS-ALARM
    async function playHeavyAlarm() {
        if (!audioCtx) return;
        alarmActive = true;

        // Loop, der so lange läuft, bis alarmActive = false
        while (alarmActive) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square'; // Aggressiver Sound
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(1.0, audioCtx.currentTime); // Volle Lautstärke
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            
            if ('vibrate' in navigator) navigator.vibrate(500);
            
            // Warte 0.6 Sekunden bis zum nächsten Piep
            await new Promise(r => setTimeout(r, 600));
        }
    }

    const workerCode = `
        let activeTimers = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                activeTimers[index] = setInterval(() => { self.postMessage({ index }); }, 1000);
            } else {
                clearInterval(activeTimers[index]);
                delete activeTimers[index];
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(workerBlob));

    const defaultTimers = [
        { name: "Timer 1", time: 60, initial: 60 },
        { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 },
        { name: "Timer 4", time: 900, initial: 900 },
        { name: "Timer 5", time: 1200, initial: 1200 },
        { name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('savedTimers')) || defaultTimers;

    timerWorker.onmessage = function(e) {
        const idx = e.data.index;
        if (timers[idx].time > 0) {
            timers[idx].time--;
            if (timers[idx].time === 0) {
                stopTimer(idx);
                timers[idx].time = timers[idx].initial;
                render();
                
                // Starte den unendlichen Loop
                playHeavyAlarm();
                
                // Alert Fenster
                setTimeout(() => {
                    alert("⏰ ALARM: " + timers[idx].name);
                    alarmActive = false; // Stoppt den Sound-Loop nach Klick auf OK
                    if ('vibrate' in navigator) navigator.vibrate(0);
                }, 100);
            }
            render();
        }
    };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = running[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `
                <div class="label" onclick="editName(${i})">${t.name}</div>
                <div class="time-display" onclick="editTime(${i})">${format(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggle(${i})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(div);
        });
    }

    function format(s) {
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
    }

    function toggle(i) {
        if (running[i]) {
            stopTimer(i);
            timers[i].time = timers[i].initial;
        } else {
            if (!audioCtx) { alert("Bitte erst oben auf den orangenen Button klicken!"); return; }
            running[i] = true;
            timerWorker.postMessage({ index: i, cmd: 'start' });
        }
        render();
    }

    function stopTimer(i) {
        running[i] = false;
        timerWorker.postMessage({ index: i, cmd: 'stop' });
        render();
    }

    function editTime(i) {
        let m = prompt("Minuten für " + timers[i].name + ":", timers[i].initial / 60);
        if (m) {
            timers[i].initial = parseInt(m) * 60;
            timers[i].time = timers[i].initial;
            localStorage.setItem('savedTimers', JSON.stringify(timers));
            render();
        }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { 
            timers[i].name = n; 
            localStorage.setItem('savedTimers', JSON.stringify(timers));
            render(); 
        }
    }

    render();
</script>
</body>
</html>
