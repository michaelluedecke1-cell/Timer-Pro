
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); border-radius: 15px; 
            padding: 15px; text-align: center; border: 2px solid transparent;
        }

        .timer-box.running { border-color: var(--accent); }

        .label { color: #94a3b8; font-size: 12px; margin-bottom: 5px; font-weight: bold; cursor: pointer; }
        .time-display { font-size: 28px; font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 10px; cursor: pointer; }

        .btn { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px; border-radius: 10px; width: 100%; 
            font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        /* Eigenes Alarm-Fenster */
        #custom-alert {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999; flex-direction: column; justify-content: center; align-items: center;
        }

        #custom-alert h2 { font-size: 40px; color: var(--danger); margin-bottom: 20px; text-align: center; }

        #audio-init {
            background: #f59e0b; color: white; border: none; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            font-weight: bold; width: 100%; max-width: 400px; cursor: pointer;
        }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">🔊 ALARM STARTBEREIT MACHEN</button>

<div class="container" id="app"></div>

<div id="custom-alert">
    <h2 id="alert-name">FERTIG</h2>
    <button class="btn stop" style="width: 200px; padding: 20px; font-size: 20px;" onclick="closeAlarm()">ALARM STOPP</button>
</div>

<script>
    let audioCtx = null;
    let alarmActive = false;
    let running = {};

    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const silentOsc = audioCtx.createOscillator();
        const silentGain = audioCtx.createGain();
        silentGain.gain.value = 0.001;
        silentOsc.connect(silentGain);
        silentGain.connect(audioCtx.destination);
        silentOsc.start();
        this.style.display = "none";
    });

    async function playInfiniteAlarm() {
        if (!audioCtx) return;
        alarmActive = true;
        while (alarmActive) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            let freq = (Math.floor(Date.now() / 200) % 2 === 0) ? 1400 : 800;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
            if ('vibrate' in navigator) navigator.vibrate(200);
            await new Promise(r => setTimeout(r, 200));
        }
    }

    function closeAlarm() {
        alarmActive = false;
        document.getElementById('custom-alert').style.display = "none";
        if ('vibrate' in navigator) navigator.vibrate(0);
    }

    const workerCode = `
        let activeTimers = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                activeTimers[index] = setInterval(() => { self.postMessage({ index }); }, 1000);
            } else {
                clearInterval(activeTimers[index]);
                delete activeTimers[index];
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(workerBlob));

    const defaultData = [
        { name: "Timer 1", time: 60, initial: 60 }, { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 }, { name: "Timer 4", time: 900, initial: 900 },
        { name: "Timer 5", time: 1200, initial: 1200 }, { name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('myTimers')) || defaultData;

    timerWorker.onmessage = function(e) {
        const idx = e.data.index;
        if (timers[idx].time > 0) {
            timers[idx].time--;
            if (timers[idx].time === 0) {
                stopTimer(idx);
                timers[idx].time = timers[idx].initial;
                render();
                
                document.getElementById('alert-name').innerText = timers[idx].name;
                document.getElementById('custom-alert').style.display = "flex";
                playInfiniteAlarm();
            }
            render();
        }
    };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = running[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `<div class="label" onclick="editName(${i})">${t.name}</div><div class="time-display" onclick="editTime(${i})">${format(t.time)}</div><button class="btn ${isRunning ? 'stop' : ''}" onclick="toggle(${i})">${isRunning ? 'STOP' : 'START'}</button>`;
            app.appendChild(div);
        });
    }

    function format(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`; }

    function toggle(i) {
        if (running[i]) { stopTimer(i); timers[i].time = timers[i].initial; }
        else { if (!audioCtx) { alert("SOUND AKTIVIEREN!"); return; } running[i] = true; timerWorker.postMessage({ index: i, cmd: 'start' }); }
        render();
    }

    function stopTimer(i) { running[i] = false; timerWorker.postMessage({ index: i, cmd: 'stop' }); render(); }

    function editTime(i) {
        let m = prompt("Minuten:", timers[i].initial / 60);
        if (m) { timers[i].initial = parseInt(m) * 60; timers[i].time = timers[i].initial; save(); render(); }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { timers[i].name = n; save(); render(); }
    }

    function save() { localStorage.setItem('myTimers', JSON.stringify(timers)); }
    render();
</script>
</body>
</html>
