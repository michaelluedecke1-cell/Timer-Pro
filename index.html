
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 15px; letter-spacing: 1px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .timer-box.running { 
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .label { color: var(--text-dim); font-size: 13px; margin-bottom: 5px; font-weight: bold; cursor: pointer; }
        .time-display { font-size: 30px; font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 12px; cursor: pointer; }

        .btn { 
            background: var(--accent); 
            border: none; 
            color: #fff; 
            padding: 12px; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        #audio-init {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">🔊 ALARM-SOUND AKTIVIEREN</button>

<div class="container" id="app"></div>

<script>
    let audioCtx = null;
    let alarmInterval = null;

    // Aktiviert Audio (Muss durch User-Klick passieren)
    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.style.display = 'none';
    });

    // Intensiver Alarmton in Endlosschleife
    function startAlarm() {
        if (!audioCtx) return;
        
        const playTone = () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        };

        playTone();
        alarmInterval = setInterval(playTone, 600);
        if ('vibrate' in navigator) navigator.vibrate([500, 200, 500, 200]);
    }

    function stopAlarm() {
        clearInterval(alarmInterval);
        if ('vibrate' in navigator) navigator.vibrate(0);
    }

    // WEB WORKER: Läuft im Hintergrund weiter, auch wenn Handy gesperrt
    const workerCode = `
        let activeTimers = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                activeTimers[index] = setInterval(() => {
                    self.postMessage({ index });
                }, 1000);
            } else {
                clearInterval(activeTimers[index]);
                delete activeTimers[index];
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(workerBlob));

    const defaultTimers = [
        { name: "Timer 1", time: 60, initial: 60 },
        { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 },
        { name: "Timer 4", time: 900, initial: 900 }
    ];

    let timers = JSON.parse(localStorage.getItem('savedTimers')) || defaultTimers;
    let running = {};

    timerWorker.onmessage = function(e) {
        const idx = e.data.index;
        if (timers[idx].time > 0) {
            timers[idx].time--;
            if (timers[idx].time === 0) {
                stopTimer(idx);
                startAlarm();
                timers[idx].time = timers[idx].initial; // Sofort Reset
                setTimeout(() => {
                    alert("⏰ " + timers[idx].name + " FERTIG!");
                    stopAlarm();
                }, 50);
            }
            render();
        }
    };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = running[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `
                <div class="label" onclick="editName(${i})">${t.name}</div>
                <div class="time-display" onclick="editTime(${i})">${format(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggle(${i})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(div);
        });
    }

    function format(s) {
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
    }

    function toggle(i) {
        if (running[i]) {
            stopTimer(i);
            timers[i].time = timers[i].initial;
        } else {
            running[i] = true;
            timerWorker.postMessage({ index: i, cmd: 'start' });
        }
        render();
    }

    function stopTimer(i) {
        running[i] = false;
        timerWorker.postMessage({ index: i, cmd: 'stop' });
        render();
    }

    function editTime(i) {
        let m = prompt("Minuten für " + timers[i].name + ":", timers[i].initial / 60);
        if (m) {
            timers[i].initial = parseInt(m) * 60;
            timers[i].time = timers[i].initial;
            save();
            render();
        }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { timers[i].name = n; save(); render(); }
    }

    function save() { localStorage.setItem('savedTimers', JSON.stringify(timers)); }

    render();
</script>
</body>
</html>
