
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Sirene</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); border-radius: 15px; 
            padding: 15px; text-align: center; border: 2px solid transparent;
        }

        .timer-box.running { border-color: var(--accent); }

        .label { color: #94a3b8; font-size: 12px; margin-bottom: 5px; font-weight: bold; cursor: pointer; }
        .time-display { font-size: 28px; font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 10px; cursor: pointer; }

        .btn { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px; border-radius: 10px; width: 100%; 
            font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        /* Custom Alert Overlay */
        #alert-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }

        #alert-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 4px solid var(--danger); text-align: center;
        }

        #alert-name { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #fff; }

        #audio-init {
            background: #f59e0b; color: white; border: none; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            font-weight: bold; width: 100%; max-width: 400px; cursor: pointer;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">⚠️ SCHRITTE 1: SOUND AKTIVIEREN</button>

<div class="container" id="app"></div>

<div id="alert-overlay">
    <div id="alert-box">
        <div id="alert-name">TIMER FERTIG</div>
        <button class="btn stop" style="padding: 20px; font-size: 18px;" onclick="stopSirene()">SIRENE STOPPEN</button>
    </div>
</div>

<script>
    let audioCtx = null;
    let sireneInterval = null;
    let running = {};

    // 1. Audio-Initialisierung durch Klick
    document.getElementById('audio-init').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Test-Ton um sicherzugehen
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        
        this.style.display = "none";
    });

    // Die Sirene: Schriller Wiu-Wiu Ton ohne Ende
    function startSirene() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (sireneInterval) clearInterval(sireneInterval);

        sireneInterval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; // Schriller Sägezahn-Sound
            
            // Frequenz-Wechsel für Sirenen-Effekt
            let now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1600, now + 0.2);
            
            gain.gain.setValueAtTime(1.0, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(now + 0.3);
            
            if ('vibrate' in navigator) navigator.vibrate(200);
        }, 300);
    }

    function stopSirene() {
        if (sireneInterval) {
            clearInterval(sireneInterval);
            sireneInterval = null;
        }
        document.getElementById('alert-overlay').style.display = "none";
        if ('vibrate' in navigator) navigator.vibrate(0);
    }

    // Worker für Hintergrund-Zählung
    const workerCode = `
        let timers = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                timers[index] = setInterval(() => { self.postMessage({ index }); }, 1000);
            } else {
                clearInterval(timers[index]);
                delete timers[index];
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(workerBlob));

    const defaultTimers = [
        { name: "Timer 1", time: 60, initial: 60 },
        { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 },
        { name: "Timer 4", time: 900, initial: 900 },
        { name: "Timer 5", time: 1200, initial: 1200 },
        { name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('myTimers')) || defaultTimers;

    timerWorker.onmessage = function(e) {
        const idx = e.data.index;
        if (timers[idx].time > 0) {
            timers[idx].time--;
            if (timers[idx].time === 0) {
                stopTimer(idx);
                timers[idx].time = timers[idx].initial;
                render();
                
                // Alarm Fenster & Sirene
                document.getElementById('alert-name').innerText = timers[idx].name;
                document.getElementById('alert-overlay').style.display = "flex";
                startSirene();
            }
            render();
        }
    };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = running[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `
                <div class="label" onclick="editName(${i})">${t.name}</div>
                <div class="time-display" onclick="editTime(${i})">${format(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggle(${i})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(div);
        });
    }

    function format(s) {
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
    }

    function toggle(i) {
        if (running[i]) {
            stopTimer(i);
            timers[i].time = timers[i].initial;
        } else {
            if (!audioCtx) { alert("Bitte erst 'SOUND AKTIVIEREN' klicken!"); return; }
            running[i] = true;
            timerWorker.postMessage({ index: i, cmd: 'start' });
        }
        render();
    }

    function stopTimer(i) {
        running[i] = false;
        timerWorker.postMessage({ index: i, cmd: 'stop' });
        render();
    }

    function editTime(i) {
        let m = prompt("Minuten:", timers[i].initial / 60);
        if (m) {
            timers[i].initial = parseInt(m) * 60;
            timers[i].time = timers[i].initial;
            save(); render();
        }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { timers[i].name = n; save(); render(); }
    }

    function save() { localStorage.setItem('myTimers', JSON.stringify(timers)); }

    render();
</script>
</body>
</html>
