
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 15px; }

        .container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); border-radius: 20px; 
            padding: 20px; text-align: center; border: 2px solid transparent;
        }

        .timer-box.running { border-color: var(--accent); box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }

        .label { color: var(--text-dim); font-size: 13px; margin-bottom: 5px; font-weight: bold; cursor: pointer; }
        .time-display { font-size: 30px; font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 12px; cursor: pointer; }

        .btn { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px; border-radius: 12px; width: 100%; 
            font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .btn.stop { background: var(--danger); }

        #audio-init {
            background: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
            font-weight: bold; width: 100%; max-width: 400px; cursor: pointer;
        }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>
<button id="audio-init">🔊 SOUND AKTIVIEREN & START</button>

<div class="container" id="app"></div>

<script>
    let audioCtx = null;
    let alarmInterval = null;
    let running = {};

    // Audio Initialisierung
    document.getElementById('audio-init').addEventListener('click', function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Erzeugt eine kurze Stille, um den Audio-Kanal zu öffnen
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }
        this.style.display = 'none';
    });

    function startAlarm() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const playTone = () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        };

        playTone();
        alarmInterval = setInterval(playTone, 600);
        if ('vibrate' in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
    }

    function stopAlarm() {
        clearInterval(alarmInterval);
        if ('vibrate' in navigator) navigator.vibrate(0);
    }

    // Web Worker Code
    const workerCode = `
        let activeTimers = {};
        self.onmessage = function(e) {
            const { index, cmd } = e.data;
            if (cmd === 'start') {
                activeTimers[index] = setInterval(() => { self.postMessage({ index }); }, 1000);
            } else {
                clearInterval(activeTimers[index]);
                delete activeTimers[index];
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const timerWorker = new Worker(URL.createObjectURL(workerBlob));

    const defaultTimers = [
        { name: "Timer 1", time: 60, initial: 60 },
        { name: "Timer 2", time: 300, initial: 300 },
        { name: "Timer 3", time: 600, initial: 600 },
        { name: "Timer 4", time: 900, initial: 900 },
        { name: "Timer 5", time: 1200, initial: 1200 },
        { name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('savedTimers')) || defaultTimers;

    timerWorker.onmessage = function(e) {
        const idx = e.data.index;
        if (timers[idx].time > 0) {
            timers[idx].time--;
            if (timers[idx].time === 0) {
                stopTimer(idx);
                startAlarm();
                timers[idx].time = timers[idx].initial; // Zurücksetzen für das Display
                render();
                
                // Kurze Verzögerung für den Alert
                setTimeout(() => {
                    alert("⏰ ZEIT ABGELAUFEN: " + timers[idx].name);
                    stopAlarm();
                }, 100);
            }
            render();
        }
    };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, i) => {
            const isRunning = running[i];
            const div = document.createElement('div');
            div.className = `timer-box ${isRunning ? 'running' : ''}`;
            div.innerHTML = `
                <div class="label" onclick="editName(${i})">${t.name}</div>
                <div class="time-display" onclick="editTime(${i})">${format(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggle(${i})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(div);
        });
    }

    function format(s) {
        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
    }

    function toggle(i) {
        if (running[i]) {
            stopTimer(i);
            timers[i].time = timers[i].initial;
        } else {
            if (!audioCtx) alert("Bitte zuerst oben den Sound aktivieren!");
            running[i] = true;
            timerWorker.postMessage({ index: i, cmd: 'start' });
        }
        render();
    }

    function stopTimer(i) {
        running[i] = false;
        timerWorker.postMessage({ index: i, cmd: 'stop' });
    }

    function editTime(i) {
        let m = prompt("Minuten für " + timers[i].name + ":", timers[i].initial / 60);
        if (m !== null && m !== "") {
            const val = parseInt(m) * 60;
            timers[i].initial = val;
            timers[i].time = val;
            save();
            render();
        }
    }

    function editName(i) {
        let n = prompt("Name:", timers[i].name);
        if (n) { timers[i].name = n; save(); render(); }
    }

    function save() {
        localStorage.setItem('savedTimers', JSON.stringify(timers));
    }

    render();
</script>
</body>
</html>
