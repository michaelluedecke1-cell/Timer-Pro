
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Timer Station Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 20px; color: var(--text-main); letter-spacing: 1px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .timer-box { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .timer-box.running { 
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .label { 
            color: var(--text-dim); 
            font-size: 14px; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-display { 
            font-size: 32px; 
            font-family: monospace;
            font-weight: bold; 
            color: var(--accent); 
            margin-bottom: 15px; 
            cursor: pointer;
        }

        .btn { 
            background: var(--accent); 
            border: none; 
            color: #fff; 
            padding: 12px; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn.stop { background: var(--danger); }
        .btn:active { opacity: 0.8; }

        .footer { margin-top: 30px; font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<h1>TIMER STATION</h1>

<div class="container" id="app"></div>

<div class="footer">
    Tippe auf Namen oder Zeit zum Bearbeiten<br>
    Stelle sicher, dass der Ton am Gerät eingeschaltet ist.
</div>

<script>
    // Alarm-Sound initialisieren
    const alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    
    const defaultData = [
        { id: 1, name: "Timer 1", time: 60, initial: 60 },
        { id: 2, name: "Timer 2", time: 300, initial: 300 },
        { id: 3, name: "Timer 3", time: 600, initial: 600 },
        { id: 4, name: "Timer 4", time: 900, initial: 900 },
        { id: 5, name: "Timer 5", time: 1200, initial: 1200 },
        { id: 6, name: "Timer 6", time: 1800, initial: 1800 }
    ];

    let timers = JSON.parse(localStorage.getItem('myTimers')) || defaultData;
    let intervals = {};

    function saveToStorage() {
        localStorage.setItem('myTimers', JSON.stringify(timers));
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        timers.forEach((t, index) => {
            const isRunning = intervals[index];
            const box = document.createElement('div');
            box.className = `timer-box ${isRunning ? 'running' : ''}`;
            box.innerHTML = `
                <div class="label" onclick="editName(${index})">${t.name}</div>
                <div class="time-display" onclick="editTime(${index})">${formatTime(t.time)}</div>
                <button class="btn ${isRunning ? 'stop' : ''}" onclick="toggleTimer(${index})">
                    ${isRunning ? 'STOP' : 'START'}
                </button>
            `;
            app.appendChild(box);
        });
    }

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = s % 60;
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function toggleTimer(index) {
        // Browser-Audio entsperren (Wichtig für Mobilgeräte)
        alarmSound.play().then(() => {
            alarmSound.pause();
            alarmSound.currentTime = 0;
        }).catch(() => {});

        if (intervals[index]) {
            clearInterval(intervals[index]);
            delete intervals[index];
            render();
        } else {
            // Falls Timer bereits auf 0, zurücksetzen vor Start
            if (timers[index].time <= 0) {
                timers[index].time = timers[index].initial || 60;
            }

            intervals[index] = setInterval(() => {
                if (timers[index].time > 0) {
                    timers[index].time--;
                    // Performance-Optimierung: Nur das betroffene Element updaten statt ganzes render()
                    render(); 
                } else {
                    clearInterval(intervals[index]);
                    delete intervals[index];
                    
                    // ALARM AUSLÖSEN
                    alarmSound.play();
                    try { window.navigator.vibrate([500, 200, 500]); } catch(e) {}
                    
                    render();
                    
                    // Kurze Verzögerung für das Alert, damit der Browser den Sound-Thread nicht blockiert
                    setTimeout(() => {
                        alert("ZEIT ABGELAUFEN: " + timers[index].name);
                    }, 100);
                }
            }, 1000);
            render();
        }
    }

    function editTime(index) {
        let currentMin = Math.floor(timers[index].time / 60);
        let newMin = prompt("Minuten für " + timers[index].name + ":", currentMin);
        if (newMin !== null && newMin !== "") {
            const val = parseInt(newMin) * 60;
            timers[index].time = val;
            timers[index].initial = val; // Speicher den Startwert zum Resetten
            saveToStorage();
            render();
        }
    }

    function editName(index) {
        let newName = prompt("Name für diesen Timer:", timers[index].name);
        if (newName) {
            timers[index].name = newName;
            saveToStorage();
            render();
        }
    }

    // Initiales Rendern
    render();
</script>
</body>
</html>
