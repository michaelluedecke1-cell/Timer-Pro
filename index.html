
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2784/2784459.png">
    <title>Timer Station Pro</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #32d74b; --stop: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: env(safe-area-inset-top) 0 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { width: 100%; display: flex; justify-content: flex-end; padding: 10px 20px; box-sizing: border-box; }
        #fs-btn { background: #222; border: 1px solid #444; color: #888; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        h2 { color: var(--accent); letter-spacing: 2px; margin: 10px 0 30px 0; font-weight: 800; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 480px; }
        .box { background: var(--card); padding: 20px 10px; border-radius: 24px; border: 1px solid #222; text-align: center; }
        .name-input { background: transparent; border: none; color: #666; font-size: 0.75rem; text-align: center; width: 85%; margin-bottom: 8px; outline: none; }
        .time-input { background: transparent; border: none; color: #fff; font-size: 2.4rem; font-weight: 700; width: 100%; text-align: center; font-family: monospace; outline: none; }
        button.main-btn { width: 85%; margin-top: 15px; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; font-size: 0.9rem; }
        .btn-start { background: var(--accent); color: #000; }
        .btn-stop { background: var(--stop); color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 69, 58, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); } }
    </style>
</head>
<body>
    <div class="header"><button id="fs-btn">FULLSCREEN</button></div>
    <h2>TIMER STATION</h2>
    <div class="grid" id="timerGrid"></div>
    <script>
        const fsBtn = document.getElementById('fs-btn');
        fsBtn.onclick = () => {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => alert("Nutze 'Zum Home-Bildschirm' für Fullscreen.")); fsBtn.innerText = "EXIT"; }
            else { document.exitFullscreen(); fsBtn.innerText = "FULLSCREEN"; }
        };
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let savedData = JSON.parse(localStorage.getItem('timerConfig')) || [
            {id: 1, name: "Timer 1", sec: 60}, {id: 2, name: "Timer 2", sec: 300},
            {id: 3, name: "Timer 3", sec: 600}, {id: 4, name: "Timer 4", sec: 1200},
            {id: 5, name: "Timer 5", sec: 1800}, {id: 6, name: "Timer 6", sec: 3600}
        ];
        const grid = document.getElementById('timerGrid');
        const activeIntervals = {};
        savedData.forEach((conf, idx) => {
            const box = document.createElement('div');
            box.className = 'box';
            box.innerHTML = `<input class="name-input" value="${conf.name}"><input class="time-input" value="${formatTime(conf.sec)}"><button class="main-btn btn-start">START</button>`;
            grid.appendChild(box);
            const btn = box.querySelector('button');
            const timeInp = box.querySelector('.time-input');
            const nameInp = box.querySelector('.name-input');
            let timerId = null;
            nameInp.oninput = () => { savedData[idx].name = nameInp.value; localStorage.setItem('timerConfig', JSON.stringify(savedData)); };
            btn.onclick = async () => {
                if (timerId || activeIntervals[idx]) {
                    clearInterval(timerId); timerId = null;
                    if (activeIntervals[idx]) { clearInterval(activeIntervals[idx]); delete activeIntervals[idx]; }
                    btn.innerText = "START"; btn.className = "main-btn btn-start"; timeInp.value = formatTime(conf.sec); return;
                }
                if ("Notification" in window) await Notification.requestPermission();
                let p = timeInp.value.split(':');
                let totalSec = p.length === 2 ? (parseInt(p[0])*60 + (parseInt(p[1]) || 0)) : parseInt(p[0])*60;
                let endTime = Date.now() + (totalSec * 1000);
                if (navigator.serviceWorker.controller) { navigator.serviceWorker.controller.postMessage({ type: 'START_TIMER', ms: totalSec * 1000, name: nameInp.value }); }
                btn.innerText = "STOP"; btn.className = "main-btn btn-stop";
                timerId = setInterval(() => {
                    let diff = Math.round((endTime - Date.now()) / 1000);
                    if (diff <= 0) { clearInterval(timerId); timerId = null; timeInp.value = "00:00"; startAlarmSound(idx); }
                    else { timeInp.value = formatTime(diff); }
                }, 1000);
            };
        });
        function startAlarmSound(index) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const play = () => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.4, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
            };
            play(); activeIntervals[index] = setInterval(play, 600);
        }
        function formatTime(s) { let m = Math.floor(s/60), sec = s%60; return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
    </script>
</body>
</html>
